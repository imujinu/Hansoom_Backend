
server:
  port: 8080
  server:
    tomcat:
      max-swallow-size: -1
      max-http-form-post-size: -1

spring:
  config:
    activate:
      on-profile: prod
  redis:
    host: redis-service # @@@@@ 바꿨음 @@@@@
    port: 6379
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/hansoom # @@@@@ 바꿨음 @@@@@
    username: admin # @@@@@ 바꿨음 @@@@@
    password: ${DB_PW} # @@@@@ 바꿨음 @@@@@
  jpa:
    database: mysql
    # innoDB를 쓰겠다 라는 설정
    database-platform: org.hibernate.dialect.MariaDBDialect
    # ddl 문 자동생성 여부 true. 테이블은 자동생성(반영)해주나, 스키마는 반드시 사전에 생성 필요
    generate-ddl: true
    # jpa(인터페이스)의 실질적인 구현체는 hibernate 이다.
    hibernate:
      ddl-auto: update
    # 콘솔창에 ddl, dml 등의 쿼리를 출력하여 보여주는 옵션
    show_sql: true
  servlet:
    multipart:
      # spring의 디폴트 사이즈 10MB
      enabled: true
      max-file-size: 1000MB
      max-request-size: 1000MB
  elasticsearch:
    uris: http://elasticsearch-service:9200 # @@@@@ 바꿨는데 확인 필요 @@@@@
    username: elastic
    password: 1234
    connection-timeout: 10s
    socket-timeout: 30s



# aws s3 접근하기 위한 계정 세팅
cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESSKEY} # @@@@@ 바꿨음 @@@@@
      secret-key: ${S3_SECRETKEY} # @@@@@ 바꿨음 @@@@@
    region:
      static: ap-northeast-2
    s3:
      bucket: eunduk-board-bucket
  kakao:
    rest-api-key: ${KAKAO_RESTAPI_KEY} # @@@@@ 바꿨음 @@@@@

jwt:
  accessTokenExpiryMinutes: 30 # 30분
  secretKeyAt: ${SECRETKEY_AT} # @@@@@ 바꿨음 @@@@@
  refreshTokenExpiryDaysPersistent: 180 # 180일 (자동 로그인 O)
  refreshTokenExpiryDaysNonPersistent: 1 # 1일 (자동 로그인 X)
  secretKeyRt: ${SECRETKEY_RT} # @@@@@ 바꿨음 @@@@@

app:
  auth:
    cookie:
      domain: www.hansoom.shop # @@@@@ 바꿨음 @@@@@
      path: /user/auth
      same-site: None            # 분리된 도메인(서브도메인/다른 도메인)이라면 None
      secure: true               # SameSite=None이면 반드시 true(HTTPS)
      http-only: true

security:
  csrf:
    allowed-origins:
      - "http://localhost:3000"
      - "https://www.hansoom.shop" # @@@@@ 바꿨음 @@@@@
    skip-paths:
      - "/health"

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID} # @@@@@ 바꿨음 @@@@@
    client-secret: ${CLIENT_SECRET} # @@@@@ 바꿨음 @@@@@
    redirect-uri: https://www.hansoom.shop/oauth/google/redirect # @@@@@ 바꿨음 @@@@@
  kakao:
    client-id: ${KAKAO_CLIENT_ID} # @@@@@ 바꿨음 @@@@@
    redirect-uri: https://www.hansoom.shop/oauth/kakao/redirect # @@@@@ 바꿨음 @@@@@

logging:
  level:
    root: info # default

chat:
  stream-key: chat:messages          # 단일 스트림 사용 (roomId는 페이로드로 구분)
  group: chat-consumers              # 컨슈머 그룹 이름
  consumer-name: ${CONSUMER_NAME:default-consumer}    # 이 인스턴스의 컨슈머 이름
